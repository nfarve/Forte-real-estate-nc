<!DOCTYPE html>

<head>

  <title>Thank You — Forte Real Estate NC</title>
  <meta name="description" content="Thank you — we'll be in touch. Forte Real Estate NC" />

  <style>
    /* Reused bright theme from index.html (trimmed to essentials) */
    :root{
      --bg: #f6f8fa; --bg-soft:#f8fafc; --card:#ffffff; --ink:#0b2a3a; --muted-ink:#526873;
      --primary:#0b63b8; --primary-600:#084f90; --line:#e6eef6; --card-shadow:0 8px 24px rgba(20,40,60,0.06);
    }
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans","Helvetica Neue",Arial;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    .container{width:min(920px,92vw);margin:0 auto;padding:48px 0}
    a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
    .nav{background:linear-gradient(180deg,rgba(255,255,255,0.98),rgba(255,255,255,0.96));border-bottom:1px solid var(--line);box-shadow:0 4px 18px rgba(20,40,60,0.04)}
    .nav-wrap{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
    .brand{display:flex;align-items:center;gap:12px;font-weight:700;color:var(--ink)}
    .brand-mark{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--primary-600));display:grid;place-items:center;color:#fff}
    .brand-mark svg{width:20px;height:20px;stroke:rgba(255,255,255,0.96)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:28px;box-shadow:var(--card-shadow);text-align:center}
    h1{margin:0 0 10px;font-size:1.6rem}
    p{color:var(--muted-ink);margin:0 0 18px}
    .btn{display:inline-flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;font-weight:600;border:1px solid transparent;background:linear-gradient(180deg,var(--primary),var(--primary-600));color:#fff;text-decoration:none}
    footer{padding:28px 0;color:var(--muted-ink);border-top:1px solid var(--line);background:transparent}
    .foot{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .social a{width:36px;height:36px;border-radius:8px;border:1px solid #e6eef6;display:grid;place-items:center;background:#fff;color:var(--primary)}
  </style>

  <main class="container">
    <div class="card" role="status" aria-live="polite">
      <h1>Thanks for reaching out!</h1>
      <p>We received your message and will follow up within 24 hours. If this is urgent, email us at <a href="mailto:forterealestatenc@gmail.com">forterealestatenc@gmail.com</a>.</p>
      <a class="btn" href="/">Back to Home</a>
    </div>
  </main>

  <footer>
    <div class="container foot">
      <div>
        <strong>Forte Real Estate NC</strong>
        <div class="muted">Property Management • North Carolina</div>
      </div>
      <div class="social">
        <a href="mailto:forterealestatenc@gmail.com" aria-label="Email">

        </a>
      </div>
    </div>
